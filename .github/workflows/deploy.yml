name: Deploy Deadline Parser API
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: docker login
        run: docker login -u "${{ secrets.DOCKER_USERNAME }}" -p  "${{ secrets.DOCKER_PASSWORD }}"

      - name: Build and push Docker image
        run: |
          docker build -t deadline-parser-api:latest .
          docker tag deadline-parser-api:latest ${{ secrets.DOCKER_USERNAME }}/deadline-parser-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/deadline-parser-api:latest

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "torch>=2.6.0" --index-url https://download.pytorch.org/whl/cpu
          
      - name: Download model files
        run: |
          chmod +x downloadModel.sh
          ./downloadModel.sh
          
      - name: Run API server
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000